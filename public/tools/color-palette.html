<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Palette Extractor — PixelCraft AI</title>
  <meta name="description" content="Extract dominant colors from any image. Get HEX codes, RGB values. Free color palette generator."/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<nav class="navbar">
  <a href="../index.html" class="nav-logo"><div class="nav-logo-icon">🎨</div> PixelCraft AI</a>
  <ul class="nav-links"><li><a href="../index.html#tools">All Tools</a></li></ul>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>
<div class="tool-page">
  <div class="tool-page-header">
    <a href="../index.html" class="back-link">← Back to All Tools</a>
    <div style="font-size:2.5rem;margin-bottom:12px;">🎨</div>
    <h1>Color Palette Extractor</h1>
    <p>Upload any image and instantly extract its dominant colors with HEX and RGB codes.</p>
  </div>
  <div class="tool-workspace">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" style="display:none"/>
      <div class="upload-icon">🎨</div>
      <h3>Drop your image here to extract colors</h3>
      <p>PNG, JPG, WebP supported</p>
    </div>
    <div id="editor" style="display:none;">
      <div class="result-area show" style="margin-top:0;">
        <div class="result-header">
          <span class="result-header-title">🎨 Extracted Color Palette</span>
          <div style="display:flex;gap:10px;">
            <select id="num-colors" class="btn btn-outline" style="padding:8px 14px;border-radius:8px;font-family:inherit;font-weight:600;">
              <option value="5">5 Colors</option>
              <option value="8" selected>8 Colors</option>
              <option value="12">12 Colors</option>
              <option value="16">16 Colors</option>
            </select>
            <button class="btn btn-gray" onclick="resetTool()">🔄 New Image</button>
          </div>
        </div>
        <div class="result-body">
          <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:24px;align-items:start;">
            <div>
              <img id="preview-img" style="width:100%;border-radius:12px;border:1.5px solid var(--border);object-fit:contain;max-height:300px;"/>
            </div>
            <div>
              <div id="palette-container"></div>
              <div style="margin-top:16px;display:flex;gap:10px;">
                <button class="btn btn-blue" id="btn-copy-all">📋 Copy All HEX</button>
                <button class="btn btn-green" id="btn-export">⬇️ Export Palette PNG</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>
let currentImg = null, extractedColors = [];
const fileInput = document.getElementById('file-input');
const uploadArea = document.getElementById('upload-area');
const editor = document.getElementById('editor');

setupDragDrop(uploadArea, handleFile);
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('num-colors').addEventListener('change', () => { if(currentImg) extractColors(); });

async function handleFile(file) {
  currentImg = await fileToImage(file);
  document.getElementById('preview-img').src = URL.createObjectURL(file);
  uploadArea.style.display = 'none';
  editor.style.display = 'block';
  extractColors();
}

function extractColors() {
  const numColors = parseInt(document.getElementById('num-colors').value);
  const canvas = document.createElement('canvas');
  const size = 100;
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(currentImg, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;

  // Simple color quantization
  let pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    if (data[i+3] < 128) continue;
    pixels.push([data[i], data[i+1], data[i+2]]);
  }

  // k-means lite
  extractedColors = kMeans(pixels, numColors);
  renderPalette();
}

function kMeans(pixels, k) {
  if (pixels.length === 0) return [];
  // Init centroids by sampling
  let centroids = [];
  const step = Math.floor(pixels.length / k);
  for (let i = 0; i < k; i++) centroids.push([...pixels[i * step]]);

  for (let iter = 0; iter < 10; iter++) {
    const clusters = Array.from({length:k}, () => []);
    for (const p of pixels) {
      let minDist = Infinity, minIdx = 0;
      centroids.forEach((c,i) => {
        const d = (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;
        if (d < minDist) { minDist = d; minIdx = i; }
      });
      clusters[minIdx].push(p);
    }
    centroids = clusters.map(c => {
      if (!c.length) return [128,128,128];
      return [
        Math.round(c.reduce((s,p) => s+p[0], 0) / c.length),
        Math.round(c.reduce((s,p) => s+p[1], 0) / c.length),
        Math.round(c.reduce((s,p) => s+p[2], 0) / c.length)
      ];
    });
  }
  return centroids;
}

function rgbToHex(r,g,b) {
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function getLuminance(r,g,b) { return 0.2126*r + 0.7152*g + 0.0722*b; }

function renderPalette() {
  const container = document.getElementById('palette-container');
  container.innerHTML = '';

  // Large swatches
  const largeRow = document.createElement('div');
  largeRow.style.cssText = 'display:flex;gap:8px;margin-bottom:20px;border-radius:16px;overflow:hidden;height:80px;';
  extractedColors.forEach(([r,g,b]) => {
    const div = document.createElement('div');
    div.style.cssText = `flex:1;background:rgb(${r},${g},${b});cursor:pointer;transition:flex 0.3s;`;
    div.title = rgbToHex(r,g,b);
    div.addEventListener('mouseenter', () => div.style.flex = '2');
    div.addEventListener('mouseleave', () => div.style.flex = '1');
    largeRow.appendChild(div);
  });
  container.appendChild(largeRow);

  // Detailed list
  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
  extractedColors.forEach(([r,g,b]) => {
    const hex = rgbToHex(r,g,b);
    const lum = getLuminance(r,g,b);
    const textColor = lum > 128 ? '#1e293b' : '#ffffff';
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all 0.2s;';
    row.innerHTML = `
      <div style="width:44px;height:44px;border-radius:10px;background:rgb(${r},${g},${b});flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.12);"></div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:0.9rem;color:var(--dark);">${hex}</div>
        <div style="font-size:0.78rem;color:var(--text-light);">rgb(${r}, ${g}, ${b})</div>
      </div>
      <button onclick="copyToClipboard('${hex}',this)" style="background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--text);transition:all 0.2s;" onmouseenter="this.style.borderColor='var(--primary)';this.style.color='var(--primary)'" onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--text)'">Copy</button>
    `;
    row.addEventListener('click', () => copyToClipboard(hex, null));
    list.appendChild(row);
  });
  container.appendChild(list);
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(`Copied: ${text}`, 'success');
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = 'Copy', 1500); }
  }).catch(() => showToast('Copy error', 'error'));
}

document.getElementById('btn-copy-all').addEventListener('click', () => {
  const hexes = extractedColors.map(([r,g,b]) => rgbToHex(r,g,b)).join(', ');
  copyToClipboard(hexes, null);
  showToast('All colors copied!', 'success');
});

document.getElementById('btn-export').addEventListener('click', () => {
  const c = document.createElement('canvas');
  const sw = 120, sh = 160;
  c.width = sw * extractedColors.length; c.height = sh;
  const ctx = c.getContext('2d');
  extractedColors.forEach(([r,g,b], i) => {
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(i*sw, 0, sw, sh*0.7);
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(rgbToHex(r,g,b), i*sw + sw/2, sh*0.7 + 24);
    ctx.fillStyle = '#64748b';
    ctx.font = '10px Arial';
    ctx.fillText(`rgb(${r},${g},${b})`, i*sw + sw/2, sh*0.7 + 40);
  });
  downloadFile(c.toDataURL('image/png'), 'color-palette.png');
});

function resetTool() {
  currentImg = null; extractedColors = [];
  uploadArea.style.display = 'block'; editor.style.display = 'none'; fileInput.value = '';
}
</script>
</body>
</html>
