<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo Repair & Restoration — PixelCraft AI</title>
  <meta name="description" content="Restore old, scratched or damaged photos. Remove noise and enhance quality automatically."/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<nav class="navbar">
  <a href="../index.html" class="nav-logo"><div class="nav-logo-icon">🎨</div> PixelCraft AI</a>
  <ul class="nav-links"><li><a href="../index.html#tools">All Tools</a></li></ul>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>
<div class="tool-page">
  <div class="tool-page-header">
    <a href="../index.html" class="back-link">← Back to All Tools</a>
    <div style="font-size:2.5rem;margin-bottom:12px;">🔧</div>
    <h1>Photo Repair & Restoration</h1>
    <p>Restore damaged, scratched, or low-quality old photos. Apply smart noise reduction and enhancement.</p>
  </div>
  <div class="tool-workspace">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" style="display:none"/>
      <div class="upload-icon">🔧</div>
      <h3>Upload a damaged or old photo</h3>
      <p>PNG, JPG, WebP supported</p>
    </div>
    <div id="editor" style="display:none;">
      <div class="result-area show" style="margin-top:0;">
        <div class="result-header">
          <span class="result-header-title">🔧 Restoration Settings</span>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-gray" onclick="resetTool()">🔄 New Image</button>
            <button class="btn btn-green" id="btn-download">⬇️ Download Restored</button>
          </div>
        </div>
        <div class="result-body">
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
            <button class="preset-fix btn btn-outline" data-fix="denoise">🧹 Denoise</button>
            <button class="preset-fix btn btn-outline" data-fix="sharpen">🔪 Sharpen</button>
            <button class="preset-fix btn btn-outline" data-fix="contrast">⚡ Enhance Contrast</button>
            <button class="preset-fix btn btn-outline" data-fix="brighten">☀️ Brighten Faded</button>
            <button class="preset-fix btn btn-outline" data-fix="full">✨ Full Restoration</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px;">
            <div class="control-group">
              <label>Noise Reduction <span class="value-label" id="denoise-val">0</span></label>
              <input type="range" id="denoise" min="0" max="5" value="0" step="1"/>
            </div>
            <div class="control-group">
              <label>Sharpness <span class="value-label" id="sharp-val">0</span></label>
              <input type="range" id="sharp" min="0" max="5" value="0" step="1"/>
            </div>
            <div class="control-group">
              <label>Brightness <span class="value-label" id="bright-val">100%</span></label>
              <input type="range" id="bright" min="50" max="200" value="100"/>
            </div>
            <div class="control-group">
              <label>Contrast <span class="value-label" id="contrast-val">100%</span></label>
              <input type="range" id="contrast" min="50" max="200" value="100"/>
            </div>
          </div>
          <button class="btn btn-blue" id="btn-apply" style="margin-bottom:20px;">Apply Restoration</button>
          <div class="before-after">
            <div><label>Original</label><canvas id="orig-canvas"></canvas></div>
            <div><label>Restored</label><canvas id="result-canvas"></canvas></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>
let currentImg = null;
const fileInput = document.getElementById('file-input');
const uploadArea = document.getElementById('upload-area');
const editor = document.getElementById('editor');
const origCanvas = document.getElementById('orig-canvas');
const resultCanvas = document.getElementById('result-canvas');

setupDragDrop(uploadArea, handleFile);
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

const presets = {
  denoise: { denoise:4, sharp:0, bright:100, contrast:100 },
  sharpen: { denoise:0, sharp:4, bright:100, contrast:105 },
  contrast: { denoise:1, sharp:1, bright:100, contrast:140 },
  brighten: { denoise:2, sharp:1, bright:140, contrast:115 },
  full: { denoise:3, sharp:2, bright:115, contrast:125 }
};

document.querySelectorAll('.preset-fix').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = presets[btn.dataset.fix];
    ['denoise','sharp','bright','contrast'].forEach(id => {
      const el = document.getElementById(id === 'bright' ? 'bright' : id === 'contrast' ? 'contrast' : id);
      if (el) { el.value = p[id === 'bright' ? 'bright' : id]; el.dispatchEvent(new Event('input')); }
    });
    document.getElementById('denoise').value = p.denoise;
    document.getElementById('sharp').value = p.sharp;
    document.getElementById('bright').value = p.bright;
    document.getElementById('contrast').value = p.contrast;
    updateLabels();
    applyRestoration();
  });
});

['denoise','sharp','bright','contrast'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => updateLabels());
});

function updateLabels() {
  document.getElementById('denoise-val').textContent = document.getElementById('denoise').value;
  document.getElementById('sharp-val').textContent = document.getElementById('sharp').value;
  document.getElementById('bright-val').textContent = document.getElementById('bright').value + '%';
  document.getElementById('contrast-val').textContent = document.getElementById('contrast').value + '%';
}

document.getElementById('btn-apply').addEventListener('click', applyRestoration);

async function handleFile(file) {
  currentImg = await fileToImage(file);
  drawImageToCanvas(origCanvas, currentImg, 800, 550);
  uploadArea.style.display = 'none';
  editor.style.display = 'block';
  applyRestoration();
}

function applyRestoration() {
  if (!currentImg) return;
  const denoiseLevel = parseInt(document.getElementById('denoise').value);
  const sharpLevel = parseInt(document.getElementById('sharp').value);
  const bright = parseInt(document.getElementById('bright').value);
  const contrast = parseInt(document.getElementById('contrast').value);

  drawImageToCanvas(resultCanvas, currentImg, 800, 550);
  const ctx = resultCanvas.getContext('2d');
  const w = resultCanvas.width, h = resultCanvas.height;
  let imgData = ctx.getImageData(0, 0, w, h);

  // Denoise (box blur approximation)
  for (let pass = 0; pass < denoiseLevel; pass++) {
    imgData = applyBoxBlur(imgData, w, h, 1);
  }

  // Sharpen (unsharp mask approximation)
  for (let pass = 0; pass < sharpLevel; pass++) {
    imgData = applySharpen(imgData, w, h);
  }

  // Brightness & Contrast
  const d = imgData.data;
  const brightFactor = bright / 100;
  const contrastFactor = contrast / 100;
  const midpoint = 128;
  for (let i = 0; i < d.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      let v = d[i+c] * brightFactor;
      v = (v - midpoint) * contrastFactor + midpoint;
      d[i+c] = Math.max(0, Math.min(255, v));
    }
  }

  ctx.putImageData(imgData, 0, 0);
}

function applyBoxBlur(imgData, w, h, radius) {
  const src = new Uint8ClampedArray(imgData.data);
  const dst = imgData.data;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let r=0,g=0,b=0,count=0;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          const nx = Math.max(0, Math.min(w-1, x+dx));
          const ny = Math.max(0, Math.min(h-1, y+dy));
          const idx = (ny*w+nx)*4;
          r+=src[idx]; g+=src[idx+1]; b+=src[idx+2]; count++;
        }
      }
      const i = (y*w+x)*4;
      dst[i]=r/count; dst[i+1]=g/count; dst[i+2]=b/count;
    }
  }
  return imgData;
}

function applySharpen(imgData, w, h) {
  const kernel = [0,-1,0,-1,5,-1,0,-1,0];
  const src = new Uint8ClampedArray(imgData.data);
  const dst = imgData.data;
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const i = (y*w+x)*4;
      for (let c = 0; c < 3; c++) {
        let v = 0;
        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            const si = ((y+ky)*w+(x+kx))*4;
            v += src[si+c] * kernel[(ky+1)*3+(kx+1)];
          }
        }
        dst[i+c] = Math.max(0, Math.min(255, v));
      }
    }
  }
  return imgData;
}

document.getElementById('btn-download').addEventListener('click', () => {
  downloadFile(resultCanvas.toDataURL('image/png'), 'pixelcraft-restored.png');
});

function resetTool() {
  currentImg = null; uploadArea.style.display = 'block'; editor.style.display = 'none'; fileInput.value = '';
}
</script>
</body>
</html>
