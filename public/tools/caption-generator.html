<body>
<div id="toast-container" class="toast-container"></div>

<div class="tool-page">
  <div class="tool-page-header">
    <a href="../index.html" class="back-link">← Back to All Tools</a>

    <h1>AI Caption Generator</h1>
    <p>Upload your image and describe it briefly to get perfect social media captions with hashtags.</p>
  </div>
  <div class="tool-workspace">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">

    </div>
    <div id="editor" style="display:none;">
      <div class="result-area show" style="margin-top:0;">

          <span class="result-header-title">💬 Caption Generator</span>
          <button class="btn btn-gray" onclick="resetTool()">🔄 New Image</button>
        </div>
        <div class="result-body">
          <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:24px;align-items:start;">
            <div>
              <img id="preview-img" style="width:100%;border-radius:12px;border:1.5px solid var(--border);object-fit:cover;max-height:260px;margin-bottom:16px;"/>
              <div class="control-group" style="margin-bottom:14px;">
                <label>Describe your image (optional)</label>
                <input type="text" id="img-desc" placeholder="e.g. sunset at beach, coffee morning, gym workout..."/>
              </div>
              <div class="control-group" style="margin-bottom:14px;">
                <label>Mood / Tone</label>
                <select id="mood">
                  <option value="inspirational">✨ Inspirational</option>
                  <option value="funny">😂 Funny</option>
                  <option value="professional">💼 Professional</option>
                  <option value="romantic">❤️ Romantic</option>
                  <option value="adventure">🏔️ Adventure</option>
                  <option value="motivational">🔥 Motivational</option>
                  <option value="chill">😎 Chill & Casual</option>
                </select>
              </div>
              <div class="control-group" style="margin-bottom:14px;">
                <label>Hashtag Count <span class="value-label" id="tag-count-val">10</span></label>
                <input type="range" id="tag-count" min="3" max="30" value="10"/>
              </div>
              <div class="control-group" style="margin-bottom:14px;">
                <label>Language</label>
                <select id="lang">
                  <option value="en">🇺🇸 English</option>
                  <option value="hi">🇮🇳 Hindi (Hinglish)</option>
                  <option value="both">🌍 Both</option>
                </select>
              </div>
              <button class="btn btn-blue" id="btn-generate" style="width:100%;justify-content:center;">✨ Generate Captions</button>
            </div>
            <div id="captions-container" style="display:none;">
              <div id="platform-tabs" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;"></div>
              <div id="caption-cards"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>
const fileInput = document.getElementById('file-input');
const uploadArea = document.getElementById('upload-area');
const editor = document.getElementById('editor');

document.getElementById('tag-count').addEventListener('input', () => {
  document.getElementById('tag-count-val').textContent = document.getElementById('tag-count').value;
});

setupDragDrop(uploadArea, handleFile);
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

const fileToUrl = f => URL.createObjectURL(f);
async function handleFile(file) {
  document.getElementById('preview-img').src = fileToUrl(file);
  uploadArea.style.display = 'none';
  editor.style.display = 'block';
}

  professional: '#business #success #entrepreneur #leadership #growth #networking #career #professional #goals #hustle #mindset #innovation #teamwork #motivated #worksmart',
  motivational: '#motivation #hustle #grind #nevergiveup #success #discipline #hardwork #goals #focusedon #achievement #winner #champion #mindset #stronger #pushyourlimits',

const HINGLISH = {
  inspirational: ["Zindagi mein kuch acha karo, khud pe trust karo ✨", "Sapne dekho, mehnat karo, aur kabhi mat ruko 💫"],
  funny: ["Padhai chhod di, kyunki main 'waqt nahi' wali category mein hoon 😂", "Apna time aayega... kal tak toh zaroor 🙃"],
  professional: ["Kaam karte raho, results aayenge hi 💼", "Success ka koi shortcut nahi hota 📈"],
  motivational: ["Haar mat maan, jeetna abhi baaki hai 🔥", "Lakshya ek, mehnat hazaar, result aayega zaroor 💪"],
  chill: ["Bhai relax, sab theek ho jayega ✌️", "Chai pi aur chill maar ☕😎"],
  romantic: ["Tum mere liye sab kuch ho ❤️", "Tere bina zindagi adhuri si hai 💕"],
  adventure: ["Duniya ghoomni hai toh nikal pado ✈️", "Har jagah mein kuch naya hai 🌍"]

document.getElementById('btn-generate').addEventListener('click', generateCaptions);

function generateCaptions() {
  const mood = document.getElementById('mood').value;
  const lang = document.getElementById('lang').value;
  const tagCount = parseInt(document.getElementById('tag-count').value);
  const desc = document.getElementById('img-desc').value;
  const caps = CAPTIONS[mood] || CAPTIONS.inspirational;
  const tags = (HASHTAGS[mood] || '').split(' ').slice(0, tagCount).join(' ');
  const hinglish = HINGLISH[mood] || [];

  const container = document.getElementById('captions-container');
  const cards = document.getElementById('caption-cards');
  container.style.display = 'block';
  cards.innerHTML = '';

  const platforms = [
    { name: 'Instagram', icon: '📷', captions: caps.instagram },
    { name: 'Twitter/X', icon: '𝕏', captions: caps.twitter },
    { name: 'LinkedIn', icon: '💼', captions: caps.linkedin }
  ];

  platforms.forEach(p => {
    const section = document.createElement('div');
    section.style.cssText = 'background:var(--bg);border-radius:12px;padding:20px;margin-bottom:16px;';
    section.innerHTML = `
      <div style="font-size:0.8rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">${p.icon} ${p.name}</div>
      ${p.captions.map((cap, i) => `
        <div style="background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative;">
          <p style="font-size:0.9rem;color:var(--dark);line-height:1.5;margin-bottom:8px;">${cap}${desc ? ' — ' + desc : ''}</p>
          <p style="font-size:0.78rem;color:var(--primary)">${tags}</p>
          ${lang !== 'en' && hinglish[i] ? `<p style="font-size:0.85rem;color:var(--accent);margin-top:6px;">${hinglish[i]}</p>` : ''}
          <button onclick="copyCaption(this)" data-text="${(cap + ' ' + tags).replace(/"/g,'&quot;')}" style="position:absolute;top:10px;right:10px;background:var(--bg2);border:none;border-radius:8px;padding:5px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;color:var(--text);">Copy</button>
        </div>
      `).join('')}
    `;
    cards.appendChild(section);
  });

  showToast('Captions generated!', 'success');
}

function copyCaption(btn) {
  navigator.clipboard.writeText(btn.dataset.text).then(() => {
    btn.textContent = '✓ Copied!'; btn.style.color = 'var(--success)';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = 'var(--text)'; }, 2000);
  });
}

function resetTool() {
  uploadArea.style.display = 'block'; editor.style.display = 'none'; fileInput.value = '';
  document.getElementById('captions-container').style.display = 'none';
}
