<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Format Converter — PixelCraft AI</title>
  <meta name="description" content="Convert images between PNG, JPG, WebP, AVIF formats online for free. Instant conversion in your browser."/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<nav class="navbar">
  <a href="../index.html" class="nav-logo"><div class="nav-logo-icon">🎨</div> PixelCraft AI</a>
  <ul class="nav-links"><li><a href="../index.html#tools">All Tools</a></li></ul>
  <div class="nav-hamburger"><span></span><span></span><span></span></div>
</nav>
<div class="tool-page">
  <div class="tool-page-header">
    <a href="../index.html" class="back-link">← Back to All Tools</a>
    <div style="font-size:2.5rem;margin-bottom:12px;">🔄</div>
    <h1>Image Format Converter</h1>
    <p>Convert images between PNG, JPG, WebP and AVIF formats instantly in your browser.</p>
  </div>
  <div class="tool-workspace">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" style="display:none"/>
      <div class="upload-icon">🔄</div>
      <h3>Drop your image to convert</h3>
      <p>Any image format supported</p>
      <div class="upload-formats">
        <span class="format-tag">PNG</span><span class="format-tag">JPG</span><span class="format-tag">WebP</span><span class="format-tag">AVIF</span><span class="format-tag">BMP</span><span class="format-tag">GIF</span>
      </div>
    </div>
    <div id="editor" style="display:none;">
      <div class="result-area show" style="margin-top:0;">
        <div class="result-header">
          <span class="result-header-title">🔄 Choose Output Format</span>
          <button class="btn btn-gray" onclick="resetTool()">🔄 New Image</button>
        </div>
        <div class="result-body">
          <div style="margin-bottom:20px;">
            <div style="font-size:0.8rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">Select Output Format</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;" id="format-grid">
              <button class="format-choice-btn" data-mime="image/png" data-ext="png">
                <div style="font-size:1.5rem;margin-bottom:6px;">🖼️</div>
                <div style="font-weight:700;color:var(--dark);">PNG</div>
                <div style="font-size:0.75rem;color:var(--text-light);">Lossless, transparent</div>
              </button>
              <button class="format-choice-btn" data-mime="image/jpeg" data-ext="jpg">
                <div style="font-size:1.5rem;margin-bottom:6px;">📸</div>
                <div style="font-weight:700;color:var(--dark);">JPG</div>
                <div style="font-size:0.75rem;color:var(--text-light);">Lossy, smaller size</div>
              </button>
              <button class="format-choice-btn" data-mime="image/webp" data-ext="webp">
                <div style="font-size:1.5rem;margin-bottom:6px;">🌐</div>
                <div style="font-weight:700;color:var(--dark);">WebP</div>
                <div style="font-size:0.75rem;color:var(--text-light);">Modern, best quality/size</div>
              </button>
              <button class="format-choice-btn" data-mime="image/avif" data-ext="avif">
                <div style="font-size:1.5rem;margin-bottom:6px;">⚡</div>
                <div style="font-weight:700;color:var(--dark);">AVIF</div>
                <div style="font-size:0.75rem;color:var(--text-light);">Smallest, newest format</div>
              </button>
            </div>
          </div>
          <div id="result-section" style="display:none;">
            <div style="background:var(--bg);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
              <div>
                <span id="orig-info" style="color:var(--text-light);font-size:0.9rem;"></span>
                <span style="color:var(--text-light);"> → </span>
                <span id="new-info" style="color:var(--success);font-weight:700;font-size:0.9rem;"></span>
              </div>
              <button class="btn btn-green" id="btn-download">⬇️ Download Converted</button>
            </div>
            <canvas id="result-canvas" style="width:100%;max-height:400px;object-fit:contain;border-radius:12px;border:1.5px solid var(--border);display:block;background:var(--bg2);"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/utils.js"></script>
<script>
let currentFile = null, currentImg = null, currentMime = null, currentExt = null;
const fileInput = document.getElementById('file-input');
const uploadArea = document.getElementById('upload-area');
const editor = document.getElementById('editor');
const resultCanvas = document.getElementById('result-canvas');

setupDragDrop(uploadArea, handleFile);
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

async function handleFile(file) {
  currentFile = file;
  currentImg = await fileToImage(file);
  uploadArea.style.display = 'none';
  editor.style.display = 'block';
}

document.querySelectorAll('.format-choice-btn').forEach(btn => {
  btn.style.cssText = 'background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:20px 16px;cursor:pointer;transition:all 0.2s;text-align:center;';
  btn.addEventListener('mouseenter', () => { btn.style.borderColor = 'var(--primary)'; btn.style.background = 'var(--primary-light)'; });
  btn.addEventListener('mouseleave', () => { btn.style.borderColor = 'var(--border)'; btn.style.background = 'var(--white)'; });
  btn.addEventListener('click', () => {
    currentMime = btn.dataset.mime;
    currentExt = btn.dataset.ext;
    convert();
  });
});

function convert() {
  if (!currentImg || !currentMime) return;
  drawImageToCanvas(resultCanvas, currentImg, 900, 600);
  const dataUrl = resultCanvas.toDataURL(currentMime, 0.9);
  const bytes = Math.round(atob(dataUrl.split(',')[1]).length);
  document.getElementById('orig-info').textContent = `${currentFile.name} (${formatFileSize(currentFile.size)})`;
  document.getElementById('new-info').textContent = `.${currentExt.toUpperCase()} • ~${formatFileSize(bytes)}`;
  document.getElementById('result-section').style.display = 'block';
}

document.getElementById('btn-download').addEventListener('click', () => {
  if (!currentMime) return;
  const dataUrl = resultCanvas.toDataURL(currentMime, 0.9);
  const origName = currentFile.name.replace(/\.[^/.]+$/, '');
  downloadFile(dataUrl, `${origName}.${currentExt}`);
});

function resetTool() {
  currentFile = null; currentImg = null;
  document.getElementById('result-section').style.display = 'none';
  uploadArea.style.display = 'block'; editor.style.display = 'none'; fileInput.value = '';
}
</script>
</body>
</html>
